services:
  web:
    build:
      context: .
      dockerfile: web-ui/Dockerfile
    container_name: superbiz-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superbiz-app
    restart: unless-stopped
    depends_on:
      - redis
      - standalone
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SPRING_SERVER_PORT: ${SPRING_SERVER_PORT:-9900}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MILVUS_HOST: ${MILVUS_HOST:-standalone}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MILVUS_USERNAME: ${MILVUS_USERNAME:-}
      MILVUS_PASSWORD: ${MILVUS_PASSWORD:-}
      MILVUS_DATABASE: ${MILVUS_DATABASE:-default}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      PROMETHEUS_MOCK_ENABLED: ${PROMETHEUS_MOCK_ENABLED:-true}
      CLS_MOCK_ENABLED: ${CLS_MOCK_ENABLED:-true}
    volumes:
      - app-uploads:/app/uploads

  redis:
    image: redis:7-alpine
    container_name: superbiz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: milvus-etcd-prod
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    volumes:
      - milvus-etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio-prod
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio:/minio_data
    command: minio server /minio_data --console-address ":9001"

  standalone:
    image: milvusdb/milvus:v2.5.10
    container_name: milvus-standalone-prod
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

volumes:
  app-uploads:
  redis-data:
  milvus-etcd:
  milvus-minio:
  milvus-data:
